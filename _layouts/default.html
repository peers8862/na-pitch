<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="utf-8">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}?v={{ site.time | date: '%s' }}">
    <link rel="icon" type="image/png" href="{{ "/favicon.png" | relative_url }}">
    <link rel="apple-touch-icon" href="{{ "/apple-touch-icon.png" | relative_url }}">
  </head>
  <body>
    <div class="site-wrapper">
      {% include sidebar.html %}
      <main class="main-content" id="main-content">
        {{ content }}
      </main>
    </div>

    <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle navigation">
      <span>&#9776;</span>
    </button>

    <script>
      (function() {
        var toggle = document.getElementById('sidebar-toggle');
        var sidebar = document.querySelector('.sidebar');
        toggle.addEventListener('click', function() {
          sidebar.classList.toggle('is-open');
        });
        document.getElementById('main-content').addEventListener('click', function() {
          sidebar.classList.remove('is-open');
        });
      })();
    </script>
  </body>
</html>
